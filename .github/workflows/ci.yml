name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Detect database changes
        id: database_changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            database:
              - 'supabase/**'
              - 'package.json'
              - 'package-lock.json'

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Check formatting
        run: npm run format:check

      - name: Validate database migrations
        if: steps.database_changes.outputs.database == 'true'
        run: npm run db:validate

      - name: Build
        run: npm run build
